# ── Backend ──────────────────────────────────────────────────
# git-gateway is Decap's native Netlify auth method.
# It connects to your GitHub repo through Netlify Identity
# so you never expose a GitHub token.
backend:
  name: git-gateway
  branch: main  # change to master if that's your default branch

# ── Media ────────────────────────────────────────────────────
# media_folder: where uploaded files land on disk
# public_folder: how they're referenced in markdown/frontmatter
# e.g. uploading app-1.png → stored at static/images/app-1.png
#                           → referenced as /images/app-1.png
media_folder: static/images
public_folder: /images

# ── Collections ──────────────────────────────────────────────
collections:

  - name: case-studies
    label: Case Studies
    label_singular: Case Study
    folder: content/case-studies
    create: true
    delete: true
    # slug template: filename is generated from the title field
    slug: "{{slug}}"
    # Preview path: clicking "View Preview" in the CMS opens this URL
    preview_path: /case-studies/{{slug}}

    fields:

      # ── Identity ──
      - label: Title
        name: title
        widget: string
        hint: "The project name."

      - label: Subtitle
        name: subtitle
        widget: string
        hint: "A brief action-description of the purpose of the effort-- why the project was undertaken, and how was it impactful?"

      - label: Slug
        name: slug
        widget: string
        hint: "URL-safe identifier. e.g. transit-pay — no spaces, lowercase"
        pattern:
          - '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          - "Lowercase letters, numbers, and hyphens only"

      - label: Description
        name: description
        widget: text
        hint: "A few lines describing the actual project (or intended outcome)."

      # ── Classification ──
      - label: Type
        name: type
        widget: select
        options:
          - { label: "UX Design",  value: "UX"      }
          - { label: "Development", value: "DEV"     }
          - { label: "UX + Dev",   value: "UX + DEV" }
        default: UX
        required: false

      - label: Role
        name: role
        widget: string
        hint: "The specific role/s played during the development of the project."
        required: false

      - label: Team Involved
        name: teamInvolved
        widget: string
        hint: "The team members involved in the project."
        required: false

      - label: Timeline Start
        name: timelineStart
        widget: string
        hint: "Month and Year we began working on the project."
        required: false

      - label: Timeline End
        name: timelineEnd
        widget: string
        hint: "Month and Year we stopped working on the project. 'Ongoing' if still in progress."
        required: false

      # ── Images ──
      - label: Hero Image (HD)
        name: image
        widget: image
        hint: "Full resolution project image. Shown on hover (desktop) and always on mobile."
        required: false
        media_library:
          config:
            multiple: false

      - label: Hero Image (Dithered)
        name: imageDithered
        widget: image
        hint: "Your manually dithered version. Shown by default on desktop until hover."
        required: false
        media_library:
          config:
            multiple: false

      # ── Video ──
      - label: Video Walkthrough URL
        name: videoUrl
        widget: string
        required: false
        hint: >
          YouTube or Vimeo URL for an interaction walkthrough.
          e.g. https://www.youtube.com/watch?v=xxxxx
          Leave blank if not applicable.
        pattern:
          - '^(https?://)?(www\.)?(youtube\.com|youtu\.be|vimeo\.com)/.+$'
          - "Must be a valid YouTube or Vimeo URL"

      # ── Body ──
      - label: Context
        name: context
        widget: string
        hint: "The context surrounding the conception of the project."
        required: false

      - label: Problem
        name: problem
        widget: string
        hint: "The problem or challenge that the project aimed to address."
        required: false

      - label: Solution
        name: solution
        widget: string
        hint: "The solution implemented to address the problem."
        required: false

      - label: Results
        name: results
        widget: string
        hint: "The results achieved through the implemented solution."
        required: false

      - label: Testing
        name: testing
        widget: string
        hint: "The testing methodology and results."
        required: false

      - label: Insights
        name: insights
        widget: string
        hint: "Key insights learned throughout the project."
        required: false

      - label: Future Work
        name: futureWork
        widget: string
        hint: "Potential developments or next steps for the project."
        required: false

      - label: Full Case Study
        name: body
        widget: markdown
        hint: >
          The full in-depth case study. Use headings (##, ###),
          blockquotes (>) for pull quotes, and the image button
          to insert inline images or GIFs.
        # Show the WYSIWYG editor by default, raw markdown toggle available
        editor_components:
          - image
          - code-block